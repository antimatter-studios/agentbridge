# agent-bridge configuration
# Defines how to spawn and communicate with a CLI agent.
# All agents use session-based conversation continuity.

# The agent to use (matches a key under "agents" below).
active: claude

agents:
  claude:
    command: claude
    args:
      - "--print"
      - "--output-format"
      - "stream-json"
      - "--model"
      - "claude-sonnet-4-6"
    input_flag: "-p"
    session_flag: "--session-id"
    resume_flag: "--resume"
    workdir: /workspace
    env:
      CI: "1"

  codex:
    command: codex
    args:
      - "--quiet"
    input_flag: ""
    workdir: /workspace
    env: {}

  opencode:
    command: opencode
    args: []
    input_flag: ""
    workdir: /workspace
    env: {}
