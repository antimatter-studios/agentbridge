# agent-bridge configuration
# Defines how to spawn and communicate with a CLI agent.

# The agent to use (matches a key under "agents" below).
active: claude

agents:
  claude:
    command: claude
    args:
      - "--print"
      - "--output-format"
      - "stream-json"
      - "--model"
      - "claude-sonnet-4-6"
    # How to send a prompt: "stdin" writes to stdin, "flag" appends as CLI arg.
    input_mode: flag
    # For flag mode, the flag that precedes the prompt text.
    input_flag: "-p"
    # Session continuity — maintains conversation context across prompts.
    session_flag: "--session-id"
    resume_flag: "--resume"
    # Working directory for the agent process (default: current dir).
    workdir: /workspace
    # Environment variables to set for the agent process.
    env:
      CI: "1"

  codex:
    command: codex
    args:
      - "--quiet"
    input_mode: stdin
    workdir: /workspace
    env: {}

  opencode:
    command: opencode
    args: []
    input_mode: stdin
    workdir: /workspace
    env: {}
